experiment_name: causal_ar_video
seed: 42

outputs_root: ${oc.env:TTT_WM_OUTPUTS_ROOT,/ariesdv0/zhaoyang/data}

model:
  arch: emu3               # "emu3" (fully causal) or "cosmos" (block-causal)
  resolution: 256
  num_channels: 3
  patch_size: 8            # 8×8 patches → 256 patches/frame

  # Emu3-style causal transformer (fully causal, no block-causal leakage)
  d_model: 512
  n_heads: 8
  n_layers: 8
  mlp_ratio: 4.0           # standard GELU MLP
  dropout: 0.1             # causal model benefits from dropout

  # AR window
  frames_in: 1             # context frames per step
  frames_out: 1            # target frames to predict per step

data:
  type: real                           # "synthetic" | "real"
  root: ${oc.env:TTT_WM_DATA_ROOT,/ariesdv0/zhaoyang/data}/libero  # LeRobot v2 dataset root
  image_key: image                     # column name in parquet ("image" or "wrist_image")
  frame_stride: 3                      # interval between frames within context / within target
  frame_gap: 8                         # interval between last context frame and first target frame
  val_split: 0.1
  extensions: [png, jpg, jpeg]         # unused for LeRobot data, kept for compat
  n_train: 2000                        # only used when type=synthetic
  n_val:   200
  moving_dot: true
  num_workers: 16
  pin_memory: true
  persistent_workers: true    # keep worker processes alive between epochs
  prefetch_factor: 4          # prefetch batches per worker

train:
  compile: true               # torch.compile — significant speedup on H100
  epochs: 100
  batch_size: 64             # H100 80G — 22M model @ 128x128, seq_len=512 tokens
  optimizer:
    lr: 1.0e-4             # Cosmos / GPT training typically uses higher lr
    weight_decay: 1.0e-2
    betas: [0.9, 0.95]
    no_decay_norm: true    # bias & norm params get weight_decay=0
  scheduler:
    warmup_fraction: 0.05  # 5% warm-up, then cosine decay
  ema:
    enabled: true
    decay: 0.9999          # Cosmos uses very slow EMA (0.9999)
    update_every: 1
  grad_clip: 1.0
  amp: true
  ckpt_dir: ${outputs_root}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  save_every: 10
  resume: ""
  log_every: 50
  device: "auto"           # auto → cuda > mps > cpu

wandb:
  project: TTT-WM
  name: ${experiment_name}

hydra:
  run:
    dir: ${outputs_root}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}