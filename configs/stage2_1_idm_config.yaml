defaults:
  - stage1_wm_config
  - _self_

experiment_name: cosmos_stage2_idm_stage${train.substep}_${data.task_dirname}_gap_${data.frame_gap}
seed: 42

data:
  use_goal: true
  frame_gap: 4
  test_task_count: 1
  selected_task: ""                                 # required — must be one of the 3 held-out tasks in meta/test_tasks.json
  task_dirname: ${task_slug:${data.selected_task}}
  task_tag: ""                                      # auto-populated from data.selected_task
  test_tasks: []                                    # auto-populated from data.selected_task
  stage2_val_fraction: 0.01
  num_workers: 8
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  loader_timeout: 600

ema:
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

val_dataloader:
  batch_size: 128
  num_workers: 8
  shuffle: false
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4

train:
  compile: false
  epochs: 100
  gradient_accumulate_every: 1
  optimizer:
    lr: 1.0e-6
    weight_decay: 7.0e-2
    betas: [0.95, 0.999]
    eps: 1.0e-8
    no_decay_norm: true
  scheduler:
    type: cosine
    warmup_fraction: 0.05
    min_lr: 0.0
  lr_scheduler: cosine
  checkpoint_every: 10
  val_every: 5
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  grad_clip: 1.0
  amp: true
  amp_dtype: bf16
  stage: 2
  substep: "2.1"
  stage1_ckpt: ""
  find_unused_parameters: false
  ckpt_dir: ${hydra:runtime.output_dir}/checkpoints

wandb:
  enabled: true
  project: TTT-WM-diffusion-V2
  name: ${now:%Y.%m.%d-%H.%M.%S}_stage${train.substep}_${data.task_dirname}_gap${data.frame_gap}
  mode: online
  resume: false
  tags:
    - diffusion_policy
    - ttt_wm
    - stage2_idm
    - stage${train.substep}
    - ${data.task_dirname}
  id: null
  group: null

hydra:
  job:
    override_dirname: stage${train.substep}_g${data.frame_gap}
  run:
    dir: ${outputs_root}/stage2_idm/${data.task_dirname}/stage${train.substep}/${now:%Y-%m-%d}/${now:%H-%M-%S}_g${data.frame_gap}
