experiment_name: ar_video
seed: 42

model:
  resolution: 128
  num_channels: 3
  patch_size: 8
  d_model: 256
  n_heads: 4
  n_layers: 4
  mlp_ratio: 4.0
  dropout: 0.1
  frames_in: 2
  frames_out: 3

outputs_root: ${oc.env:TTT_WM_OUTPUTS_ROOT,/ariesdv0/zhaoyang/data}

data:
  dataset_root: ${oc.env:TTT_WM_DATA_ROOT,/ariesdv0/zhaoyang/data}
  type: real                           # "synthetic" | "real"
  root: ${dataset_root}/libero         # LeRobot v2 dataset root
  image_key: image                     # column name in parquet ("image" or "wrist_image")
  val_split: 0.1
  extensions: [png, jpg, jpeg]         # unused for LeRobot data, kept for compat
  n_train: 2000                        # only used when type=synthetic
  n_val: 200
  moving_dot: true
  num_workers: 4
  pin_memory: true

train:
  epochs: 100
  batch_size: 16
  optimizer:
    lr: 1.0e-4
    weight_decay: 1.0e-2
    betas: [0.9, 0.95]
    no_decay_norm: true     # bias & norm params get weight_decay=0
  scheduler:
    warmup_fraction: 0.05
  ema:
    enabled: true
    decay: 0.999            # higher = slower update  (0.999 is typical)
    update_every: 1         # update EMA every N optimizer steps
  grad_clip: 1.0
  amp: true
  ckpt_dir: checkpoints
  save_every: 10
  resume: ""
  log_every: 50
  device: "auto"                # "" = auto (cuda > mps > cpu)

wandb:
  project: TTT-WM
  name: ${experiment_name}

hydra:
  run:
    dir: ${outputs_root}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}