experiment_name: cosmos_stage${train.stage}_${if:${data.use_goal},goal,no_goal}_gap_${data.frame_gap}
seed: 42

outputs_root: ${oc.env:TTT_WM_OUTPUTS_ROOT,/ariesdv0/zhaoyang/data}

model:
  resolution: 256
  num_channels: 3
  patch_size: 8            # 8×8 patches → 256 patches/frame

  # Cosmos-style causal transformer
  d_model: 512
  n_heads: 8
  n_layers: 8
  mlp_ratio: 4.0           # standard GELU MLP
  dropout: 0.1             # causal model benefits from dropout

  # AR window
  frames_in: 1             # context frames per step
  frames_out: 1            # target frames to predict per step

data:
  type: real                           # "synthetic" | "real"
  root: ${oc.env:TTT_WM_DATA_ROOT,/scr2/zhaoyang}/libero_wm  # parquet dataset root; LIBERO-90 HDF5 can be converted with scripts/prepare_libero90_hdf5.py
  image_key: image                     # column name in parquet ("image" or "wrist_image")
  action_key: actions                  # column name for actions in parquet
  action_dim: 7                        # dimensionality of action vector
  use_goal: false                      # condition on episode goal frame (last frame)
  frame_gap: 4                         # m: number of action steps between input and target
  val_split: 0.1                       # unused for real data; train uses all non-heldout tasks and val uses held-out tasks
  test_task_count: 3                   # fallback only when meta/test_tasks.json and test_tasks are both absent
  test_tasks: []                       # optional explicit task names; overrides meta/test_tasks.json when non-empty
  extensions: [png, jpg, jpeg]         # unused for LeRobot data, kept for compat
  n_train: 2000                        # only used when type=synthetic
  n_val:   200
  moving_dot: true
  num_workers: 8
  pin_memory: true
  persistent_workers: true    # keep worker processes alive between epochs
  prefetch_factor: 4          # prefetch batches per worker
  loader_timeout: 600

train:
  max_dl_timeouts: 5
  compile: true               # torch.compile — significant speedup on H100
  epochs: 100
  batch_size: 90             # H100 80G — 22M model @ 128x128, seq_len=512 tokens
  optimizer:
    lr: 1.0e-4             # Cosmos / GPT training typically uses higher lr
    weight_decay: 1.0e-2
    betas: [0.9, 0.98]
    no_decay_norm: true    # bias & norm params get weight_decay=0
  scheduler:
    warmup_fraction: 0.02  # 3% warm-up, then cosine decay
  ema:
    enabled: true
    decay: 0.9999          # Cosmos uses very slow EMA (0.9999)
    update_every: 1
  grad_clip: 1.0
  amp: true
  amp_dtype: bf16
  ckpt_dir: ${outputs_root}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
  save_every: 20
  stage: 1                # 1 = video prediction, 2 = inverse dynamics
  stage1_ckpt: ""          # path to Stage 1 checkpoint (required for stage 2)
  freeze_backbone: true    # freeze Stage 1 backbone in stage 2
  idm_type: mlp            # "mlp" | "diffusion_policy"
  idm_dp:
    num_train_timesteps: 100
    num_inference_steps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon
    obs_as_global_cond: true
    crop_shape: [84, 84]
    obs_encoder_group_norm: true
    eval_fixed_crop: true
    diffusion_step_embed_dim: 128
    down_dims: [512, 1024, 2048]
    kernel_size: 5
    n_groups: 8
    cond_predict_scale: true
  resume: ""
  # test_every: 2          # No used
  device: "auto"           # auto → cuda > mps > cpu
  find_unused_parameters: false

wandb:
  enabled: true
  project: TTT-WM
  name: ${experiment_name}

hydra:
  run:
    dir: ${outputs_root}/${experiment_name}/${now:%Y-%m-%d_%H-%M-%S}
