defaults:
  - _self_

runtime:
  diffusion_policy_src: ${oc.env:DIFFUSION_POLICY_SRC,}

name: diffusion_policy_tttwm
exp_name: default
task_name: tttwm_parquet_image

# Master switch for Weights & Biases logging. Set false (e.g. `use_wandb=false`
# on the CLI) to train without wandb — no run is created and no login is needed.
# Drives `logging.enabled` below.
# 验证已确认:use_wandb=False -> logging.enabled=False;use_wandb=True -> logging.enabled=True
use_wandb: true

outputs_root: ${oc.env:TTT_WM_OUTPUTS_ROOT,/ariesdv0/zhaoyang/data}
dataset_root: ${oc.env:TTT_WM_DATA_ROOT,/scr2/zhaoyang/libero_wm}

# horizon: 4
# n_obs_steps: 2
# n_action_steps: 2
horizon: 12
n_obs_steps: 2
n_action_steps: 6
obs_as_global_cond: true

shape_meta:
  action:
    shape: [7]   # abs: [xyz(3), rotation_6d(6), gripper(1)]
  obs:
    image:
      shape: [3, 128, 128]
      type: rgb
    # Proprio: world-frame ee pose, sliced out of the parquet `state` (8D
    # = ee_pos(3) + ee_axis_angle(3) + gripper_qpos(2)).
    ee_pos:
      shape: [3]
      type: low_dim
    # ee_ori representation is switchable between axis-angle [3] and quaternion
    # [4]; the parquet carries BOTH (`state[3:6]` axis-angle and `ee_quat`). To
    # switch reps, change `shape` here AND the matching `obs_key_mapping`/
    # `obs_slices` entries below (all three marked "ee_ori rep toggle").
    #   quaternion [4]: shape [4], obs_key_mapping ee_ori->ee_quat, no slice
    #   axis-angle [3]: shape [3], obs_key_mapping ee_ori->state, slice [3,6]
    ee_ori:                # ee_ori rep toggle
      # shape: [4]      # scalar-last [x,y,z,w] quaternion (from parquet `ee_quat`)
      shape: [3]    # axis-angle (from parquet `state[3:6]`)
      type: low_dim
    # Raw 7-DoF Panda joint positions. Sources directly from the parquet
    # `joint_pos` column (obs_key_mapping defaults key->same-name column, so no
    # mapping/slice entry needed).
    joint_pos:
      shape: [7]
      type: low_dim

data:
  action_key: actions
  obs_key_mapping:
    # Multiple obs keys can source from the same parquet column; the dataset
    # then takes per-key slices via `task.dataset.obs_slices` below.
    ee_pos: state
    # ee_ori rep toggle: quaternion reads the dedicated 4D `ee_quat` column
    # (no slice); for axis-angle [3] map to `state` and add obs_slices [3,6].
    # ee_ori: ee_quat      # quaternion [4]
    ee_ori: state          # axis-angle [3]
  val_ratio: 0.02
  selected_task: "KITCHEN_SCENE10: put the butter at the back in the top drawer of the cabinet and close it"
  max_train_episodes: null

policy:
  _target_: dp.policy.TTTWMDiffusionPolicy
  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: true
    prediction_type: epsilon

  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  obs_as_global_cond: ${obs_as_global_cond}

  crop_shape: [114, 114]
  obs_encoder_group_norm: true
  eval_fixed_crop: true

  diffusion_step_embed_dim: 128
  down_dims: [512, 1024, 2048]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

# EMA (DDPM power-law schedule, HF diffusers convention).
# Enabled iff `training.use_ema: true` (below). Read by
# dp/train_workspace.py:TrainDiffusionWorkspace via dp.common.ModelEMA.
# Checkpoint save/load prefers the EMA shadow over the live weights.
ema:
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: auto
  output_dir: ${hydra:runtime.output_dir}
  seed: 42
  debug: false
  resume: false
  resume_path: null
  lr_scheduler: cosine
  lr_warmup_steps: 50
  num_epochs: 600
  gradient_accumulate_every: 1
  grad_clip: 1.0
  use_ema: true   # gates the `ema:` block above; default True if omitted
  checkpoint_every: 50
  # Permanent snapshot every N epochs (NOT subject to topk eviction).
  # Filename is 1-indexed completed-epoch count, e.g. after 50 epochs of
  # training → `keep-epoch=0050.ckpt`. The final epoch is always saved.
  # 0 or null disables.
  keep_every_epochs: 50
  # Only keep these snapshots during the final fraction of training, e.g.
  # 0.5 → last 50% of epochs, 0.2 → last 20%. 1.0 keeps from epoch 0.
  keep_last_fraction: 0.4
  val_every: 50
  sample_every: 50
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: true
  drop_last: true
  pin_memory: true
  persistent_workers: true

val_dataloader:
  batch_size: 64
  num_workers: 2
  shuffle: false
  drop_last: false
  pin_memory: true
  persistent_workers: true

task:
  name: ${task_name}
  shape_meta: ${shape_meta}

  dataset:
    _target_: dp.parquet_dataset.TTTWMParquetImageDataset
    shape_meta: ${shape_meta}
    dataset_root: ${dataset_root}
    horizon: ${horizon}
    pad_before: ${eval:'${n_obs_steps}-1'}
    pad_after: ${eval:'${n_action_steps}-1'}
    n_obs_steps: ${n_obs_steps}
    sample_mode: video_frame
    frame_gap: ${horizon}
    frames_out: 1
    action_key: ${data.action_key}
    obs_key_mapping: ${data.obs_key_mapping}
    val_ratio: ${data.val_ratio}
    task_filter: ${data.selected_task}
    seed: ${training.seed}
    max_train_episodes: ${data.max_train_episodes}
    cache_size: 32
    verbose: true
    # On-the-fly conversion to 10D abs action:
    #   target_pos    = state[t+1][:3]
    #   rotation_6d   = axis_angle_to_rotation_6d(state[t+1][3:6])
    #   gripper       = raw_action[t, -1]
    # NOTE: when changing this flag (or shape_meta.action), delete
    #       ${dataset_root}/meta/normalizer_cache.pt before re-running.
    abs_action: false
    # rotation_rep: rotation_6d
    # state_key: state
    # state_pos_slice: [0, 3]
    # state_rot_slice: [3, 6]
    # Per-obs slice into source columns referenced via obs_key_mapping.
    # `state` is 8D = ee_pos(3) + ee_axis_angle(3) + gripper_qpos(2).
    # ee_ori rep toggle: quaternion uses the full 4D `ee_quat` column (no slice
    # entry); for axis-angle [3] uncomment the `ee_ori: [3, 6]` slice into state.
    obs_slices:
      ee_pos: [0, 3]
      ee_ori: [3, 6]       # axis-angle [3] (ee_ori maps to `state`)

checkpoint:
  # No topk / best-val_loss checkpointing: the trainer keeps `last.ckpt` plus
  # `keep-epoch=*.ckpt` snapshots (training.keep_every_epochs) only.
  save_last_ckpt: true
  save_last_snapshot: false

logging:
  enabled: ${use_wandb}   # toggle wandb via top-level `use_wandb`
  project: TTT-WM-diffusion-Latest
  mode: online
  resume: false
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${data.selected_task}
  tags:
    - diffusion_policy
    - ttt_wm
    - ${exp_name}
  id: null
  group: null

hydra:
  job:
    override_dirname: ${name}
  run:
    # `${task_slug:...}` strips ":" / spaces from data.selected_task so the
    # path stays filesystem-friendly. Resolver registered in dp/runtime.py.
    dir: ${outputs_root}/dp/${task_slug:${data.selected_task}}/${now:%Y%m%d_%H%M%S}
