experiment_name: cosmos_stage1_${if:${data.use_goal},goal,no_goal}_gap_${data.frame_gap}
seed: 42

outputs_root: ${oc.env:TTT_WM_OUTPUTS_ROOT,/ariesdv0/zhaoyang/data}

# Shared timestamp for the whole DDP run.
#   - RUN_TS env var (set once by the launcher) → all ranks see the same value
#   - fallback to ${now:...} when launched without the env var (e.g. single-GPU)
# This prevents each torchrun rank from resolving ${now:...} to a different
# second and creating multiple output folders.
run_timestamp: ${oc.env:RUN_TS,${now:%Y-%m-%d_%H-%M-%S}}

model:
  resolution: 128
  num_channels: 3
  patch_size: 8

  d_model: 768
  n_heads: 12
  n_layers: 12
  mlp_ratio: 4        
  dropout: 0.2           
  frames_in: 1
  frames_out: 1

data:
  type: real
  root: ${oc.env:TTT_WM_DATA_ROOT,/scr2/zhaoyang/libero_wm}
  image_key: image
  action_key: actions
  action_dim: 7
  use_goal: true
  frame_gap: 4
  val_split: 0.1
  test_task_count: 3
  test_tasks: []
  extensions: [png, jpg, jpeg]
  n_train: 2000
  n_val: 200
  moving_dot: true
  num_workers: 6         
  pin_memory: true
  persistent_workers: true
  prefetch_factor: 4
  loader_timeout: 600

train:
  max_dl_timeouts: 5
  compile: true
  epochs: 50
  batch_size: 64           

  gradient_accumulate_every: 1  
  optimizer:
    lr: 5.0e-6             
    weight_decay: 7.0e-2
    betas: [0.9, 0.98]    
    no_decay_norm: true
  scheduler:
    warmup_fraction: 0.05
  ema:
    enabled: true
    decay: 0.9999
    update_every: 1
  grad_clip: 1.0
  amp: true
  amp_dtype: bf16
  ckpt_dir: ${outputs_root}/${experiment_name}/${run_timestamp}
  checkpoint_every: 5
  stage: 1
  resume: ""
  device: "auto"
  find_unused_parameters: false

wandb:
  enabled: true
  project: TTT-WM-diffusion
  name: ${experiment_name}

hydra:
  run:
    dir: ${outputs_root}/${experiment_name}/${run_timestamp}